name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  deployments: write

jobs:
  deploy:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip deploy]') }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.michaelj43.dev
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
      TF_STATE_KEY: shared-api-platform/terraform.tfstate
      TF_IN_AUTOMATION: "true"

    steps:
      - uses: actions/checkout@v4

      - name: App version
        id: v
        run: |
          ver=$(node -p "require('${{ github.workspace }}/lambda/package.json').version")
          echo "app_version=$ver" >> "$GITHUB_OUTPUT"
          echo "version=$ver"

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            lambda/package-lock.json
            dashboard/package-lock.json
            auth-spa/package-lock.json

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Build Lambda
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/lambda"
          npm ci
          npm run build
          test -f dist/http.zip
          unzip -l dist/http.zip | grep -q 'node_modules/argon2/prebuilds/linux-x64' || { echo "argon2 native prebuilds missing from http.zip"; exit 1; }
          unzip -l dist/http.zip | grep -q 'node_modules/@phc/format' || { echo "@phc/format missing from http.zip"; exit 1; }
          unzip -l dist/http.zip | grep -q 'node_modules/node-gyp-build' || { echo "node-gyp-build missing from http.zip"; exit 1; }
          unzip -l dist/http.zip | grep -q 'data/ip2region/ip2region_v4.xdb' || { echo "ip2region v4 xdb missing from http.zip"; exit 1; }

      - name: Terraform init
        working-directory: deploy/terraform/aws
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        working-directory: deploy/terraform/aws
        env:
          IP_HASH: ${{ secrets.IP_HASH_SECRET }}
        run: |
          set -a
          export TF_VAR_aws_region="${{ secrets.AWS_REGION }}"
          export TF_VAR_environment=prod
          export TF_VAR_app_version="${{ steps.v.outputs.app_version }}"
          if [ -n "${{ vars.CORS_ALLOWED_BASE_HOST }}" ]; then
            export TF_VAR_cors_allowed_base_host="${{ vars.CORS_ALLOWED_BASE_HOST }}"
          fi
          if [ -n "$IP_HASH" ]; then
            export TF_VAR_ip_hash_secret="$IP_HASH"
          fi
          if [ -n "${{ vars.TF_CUSTOM_DOMAIN }}" ]; then
            export TF_VAR_custom_domain="${{ vars.TF_CUSTOM_DOMAIN }}"
          fi
          if [ -n "${{ secrets.TF_ACM_CERTIFICATE_ARN }}" ]; then
            export TF_VAR_acm_certificate_arn="${{ secrets.TF_ACM_CERTIFICATE_ARN }}"
          fi
          if [ -n "${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}" ]; then
            export TF_VAR_route53_hosted_zone_id="${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}"
          fi
          if [ -n "${{ vars.AUTH_SPA_DOMAIN }}" ]; then
            export TF_VAR_auth_spa_domain="${{ vars.AUTH_SPA_DOMAIN }}"
          fi
          if [ -n "${{ secrets.TF_AUTH_SPA_ACM_CERTIFICATE_ARN }}" ]; then
            export TF_VAR_auth_spa_acm_certificate_arn="${{ secrets.TF_AUTH_SPA_ACM_CERTIFICATE_ARN }}"
          fi
          if [ -n "${{ vars.DASHBOARD_SPA_DOMAIN }}" ]; then
            export TF_VAR_dashboard_spa_domain="${{ vars.DASHBOARD_SPA_DOMAIN }}"
          fi
          if [ -n "${{ secrets.TF_DASHBOARD_SPA_ACM_CERTIFICATE_ARN }}" ]; then
            export TF_VAR_dashboard_spa_acm_certificate_arn="${{ secrets.TF_DASHBOARD_SPA_ACM_CERTIFICATE_ARN }}"
          fi
          if [ -n "${{ secrets.TF_AUTH_SPA_ROUTE53_HOSTED_ZONE_ID }}" ]; then
            export TF_VAR_auth_spa_route53_hosted_zone_id="${{ secrets.TF_AUTH_SPA_ROUTE53_HOSTED_ZONE_ID }}"
          fi
          if [ -n "${{ secrets.TF_DASHBOARD_SPA_ROUTE53_HOSTED_ZONE_ID }}" ]; then
            export TF_VAR_dashboard_spa_route53_hosted_zone_id="${{ secrets.TF_DASHBOARD_SPA_ROUTE53_HOSTED_ZONE_ID }}"
          fi
          if [ -n "${{ vars.AUTH_DEFAULT_APP_URL }}" ]; then
            export TF_VAR_auth_default_app_url="${{ vars.AUTH_DEFAULT_APP_URL }}"
          fi
          if [ -n "${{ vars.AUTH_SESSION_TTL_SECONDS }}" ]; then
            export TF_VAR_auth_session_ttl_seconds="${{ vars.AUTH_SESSION_TTL_SECONDS }}"
          fi
          if [ -n "${{ vars.AUTH_ALLOW_REGISTER }}" ]; then
            export TF_VAR_auth_allow_register="${{ vars.AUTH_ALLOW_REGISTER }}"
          fi
          set +a
          terraform apply -auto-approve

      - name: Terraform outputs
        id: tfo
        working-directory: deploy/terraform/aws
        run: |
          echo "api_url=$(terraform output -raw http_api_url 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
          echo "table=$(terraform output -raw events_table 2>/dev/null || true)" >> "$GITHUB_OUTPUT"

      - name: Build and sync static SPAs (S3) + CloudFront invalidation
        # Deploy previously only updated Lambda + Terraform; dashboard/auth HTML/JS in S3 stayed stale.
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/deploy/terraform/aws"
          OUT=$(terraform output -json)
          DASH_B=$(echo "$OUT" | jq -r '.dashboard_spa_s3_bucket.value // empty')
          AUTH_B=$(echo "$OUT" | jq -r '.auth_spa_s3_bucket.value // empty')
          DASH_CF=$(echo "$OUT" | jq -r '.dashboard_spa_cloudfront_id.value // empty')
          AUTH_CF=$(echo "$OUT" | jq -r '.auth_spa_cloudfront_id.value // empty')
          if [ -n "$DASH_B" ] && [ "$DASH_B" != "null" ]; then
            echo "::group::dashboard → s3://$DASH_B"
            cd "$GITHUB_WORKSPACE/dashboard"
            npm ci
            npm run build
            aws s3 sync dist/ "s3://${DASH_B}/" --delete
            echo "::endgroup::"
            if [ -n "$DASH_CF" ] && [ "$DASH_CF" != "null" ]; then
              aws cloudfront create-invalidation --distribution-id "$DASH_CF" --paths "/index.html" "/*"
            fi
          fi
          if [ -n "$AUTH_B" ] && [ "$AUTH_B" != "null" ]; then
            echo "::group::auth-spa → s3://$AUTH_B"
            cd "$GITHUB_WORKSPACE/auth-spa"
            npm ci
            npm run build
            aws s3 sync dist/ "s3://${AUTH_B}/" --delete
            echo "::endgroup::"
            if [ -n "$AUTH_CF" ] && [ "$AUTH_CF" != "null" ]; then
              aws cloudfront create-invalidation --distribution-id "$AUTH_CF" --paths "/index.html" "/*"
            fi
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- **HTTP base:** ${{ steps.tfo.outputs.api_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Events table:** ${{ steps.tfo.outputs.table }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Bump lambda package version (next release)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd "$GITHUB_WORKSPACE/lambda"
          npm version patch --no-git-tag-version
          cd "$GITHUB_WORKSPACE"
          git add lambda/package.json
          git status
          git diff --staged
          if git diff --staged --quiet; then
            echo "No version change"
            exit 0
          fi
          git commit -m "chore: bump lambda version after deploy [skip deploy]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
