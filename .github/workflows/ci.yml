name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            lambda/package-lock.json
            client/package-lock.json
            auth-spa/package-lock.json
            dashboard/package-lock.json

      - name: Install (lambda)
        working-directory: lambda
        run: npm ci

      - name: Regenerate OpenAPI and fail on drift
        run: |
          set -e
          cd lambda
          npm run openapi:generate
          cd ..
          if ! git diff --exit-code -- openapi/openapi.yaml; then
            echo "openapi/openapi.yaml is out of date. Run: cd lambda && npm run openapi:generate"
            exit 1
          fi

      - name: Test with coverage
        working-directory: lambda
        run: npm run test:cov

      - name: Lambda zip includes argon2 (must match Amazon Linux; CI is linux-x64)
        working-directory: lambda
        run: |
          set -e
          node scripts/bundle.mjs
          unzip -l dist/http.zip | grep -q 'node_modules/argon2/prebuilds/linux-x64' || { echo "argon2 linux prebuild missing from http.zip"; exit 1; }
          test "$(unzip -l dist/http.zip | grep -c 'node_modules/argon2/')" -ge 1

      - name: Spectral (OpenAPI)
        working-directory: lambda
        run: npx spectral lint --ruleset ../.spectral.yaml ../openapi/openapi.yaml

      - name: Install and build (browser client)
        run: |
          set -e
          cd client
          npm ci
          npm run build

      - name: Build auth-spa
        run: |
          set -e
          cd auth-spa
          npm ci
          npm run build

      - name: Build dashboard
        run: |
          set -e
          cd dashboard
          npm ci
          npm run build

  dredd:
    if: vars.DREDD_BASE_URL != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contract/package-lock.json

      - name: Install (contract)
        working-directory: contract
        run: npm ci

      - name: Dredd
        working-directory: contract
        run: node run-dredd.cjs
        env:
          DREDD_BASE_URL: ${{ vars.DREDD_BASE_URL }}
          DREDD_ORIGIN: ${{ vars.DREDD_ORIGIN || 'https://michaelj43.dev' }}
